version: '3.12.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wallet_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wallet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wallet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wallet_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/wallet_db
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    restart: always
    command: >
      sh -c "sleep 5 &&
             export PYTHONPATH=/app &&
             cd /app &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data: